<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DV — Splash Parallax v3</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.3.21/dist/lenis.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--c:#181919;--cr:#F4F3F1}
    html,body{height:auto;background:var(--c);color:var(--cr);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow-x:hidden}

    /* ── REEL ── */
    .reel{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--c);position:relative;z-index:2}
    .reel h2{font-size:1.6rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;opacity:.25}

    /* ── SCENE WRAPPER — gives scroll runway ── */
    .scene-wrap{height:250vh;position:relative}

    /* ── PINNED VIEWPORT ── */
    .scene{width:100%;height:100vh;overflow:hidden;position:relative;background:var(--c)}

    /* ── LAYERS ── */
    .L{position:absolute;inset:0;will-change:transform}

    /* sky */
    .L-sky{z-index:1;background:linear-gradient(180deg,#1a2030 0%,#283040 30%,#2d3848 55%,var(--c) 100%)}

    /* building photo — oversized for parallax travel */
    .L-bld{z-index:2}
    .L-bld img{
      position:absolute;
      width:110%;height:140%;
      left:-5%;top:-20%;
      object-fit:cover;object-position:center 50%;
    }

    /* dark vignette — baked-in framing */
    .L-vig{z-index:3;pointer-events:none;
      background:radial-gradient(ellipse 65% 65% at 50% 48%,transparent 15%,rgba(24,25,25,.35) 45%,rgba(24,25,25,.8) 75%,var(--c) 100%)}

    /* fog */
    .L-fog{z-index:5;pointer-events:none}
    .fog{position:absolute;width:280%;left:-90%;filter:blur(50px);opacity:0}
    .f1{height:22vh;bottom:5%;
      background:linear-gradient(90deg,transparent,rgba(55,70,85,.3) 30%,rgba(70,85,100,.45) 50%,rgba(55,70,85,.25) 70%,transparent);
      animation:d1 20s ease-in-out infinite}
    .f2{height:16vh;bottom:28%;
      background:linear-gradient(90deg,transparent 10%,rgba(50,65,80,.2) 35%,rgba(65,80,95,.3) 55%,transparent 80%);
      animation:d2 26s ease-in-out infinite}
    .f3{height:28vh;bottom:-3%;
      background:linear-gradient(90deg,transparent,rgba(40,55,70,.35) 25%,rgba(55,70,85,.5) 45%,rgba(40,55,70,.25) 65%,transparent);
      animation:d3 16s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translateX(0)}50%{transform:translateX(14vw)}}
    @keyframes d2{0%,100%{transform:translateX(0)}50%{transform:translateX(-10vw)}}
    @keyframes d3{0%,100%{transform:translateX(0)}50%{transform:translateX(18vw)}}

    /* rays */
    .L-ray{z-index:4;pointer-events:none;opacity:0}
    .ray{position:absolute;top:-25%;height:150%;
      background:linear-gradient(180deg,rgba(170,185,200,.1) 0%,rgba(170,185,200,.03) 30%,transparent 65%);
      transform-origin:top center;filter:blur(14px)}
    .r1{left:28%;width:6px;transform:rotate(-12deg)}
    .r2{left:40%;width:3px;transform:rotate(-5deg);opacity:.6}
    .r3{left:54%;width:5px;transform:rotate(7deg);opacity:.4}
    .r4{left:66%;width:2px;transform:rotate(14deg);opacity:.25}

    /* foreground silhouettes */
    .L-fg{z-index:6;pointer-events:none}
    .fg-l{position:absolute;bottom:-15%;left:-10%;width:35vw;height:60vh;
      background:radial-gradient(ellipse at 20% 90%,rgba(8,12,8,.97) 0%,rgba(12,20,12,.7) 25%,rgba(18,28,18,.3) 45%,transparent 65%);filter:blur(3px)}
    .fg-r{position:absolute;bottom:-15%;right:-10%;width:40vw;height:65vh;
      background:radial-gradient(ellipse at 80% 90%,rgba(8,12,8,.97) 0%,rgba(12,20,12,.7) 25%,rgba(18,28,18,.3) 45%,transparent 65%);filter:blur(3px)}

    /* particles */
    .L-pt{z-index:7;pointer-events:none}
    .pt{position:absolute;background:rgba(160,175,190,.45);border-radius:50%;animation:fl linear infinite}
    @keyframes fl{0%{transform:translate(0,0);opacity:0}8%{opacity:.5}92%{opacity:.5}100%{transform:translate(35px,-115vh);opacity:0}}

    /* blends */
    .L-top{z-index:10;pointer-events:none;background:var(--c)}
    .L-bot{z-index:8;pointer-events:none;
      background:linear-gradient(0deg,var(--c) 0%,rgba(24,25,25,.9) 10%,rgba(24,25,25,.5) 25%,transparent 50%)}

    /* ── CONTENT ── */
    .cta{position:relative;z-index:2;background:var(--c);padding:100px 40px;text-align:center}
    .cta h2{font-size:clamp(1.2rem,2.5vw,2rem);font-weight:300;letter-spacing:.12em;text-transform:uppercase;opacity:.45;margin-bottom:14px}
    .cta p{font-size:.9rem;color:rgba(244,243,241,.2);max-width:460px;margin:0 auto;line-height:1.8}

    /* hint */
    .hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;text-align:center;opacity:.3}
    .hint span{display:block;font-size:9px;letter-spacing:.35em;text-transform:uppercase;margin-bottom:5px}
    .hint i{display:block;width:1px;height:26px;background:var(--cr);margin:0 auto;animation:p 2s ease-in-out infinite}
    @keyframes p{0%,100%{opacity:.25;transform:scaleY(1)}50%{opacity:.7;transform:scaleY(1.4)}}

    /* grain */
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.035;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat;background-size:256px}
  </style>
</head>
<body>

<section class="reel"><h2>Demo Reel</h2></section>

<section class="scene-wrap">
  <div class="scene" id="pin">
    <div class="L L-sky" id="sky"></div>
    <div class="L L-bld" id="bld"><img src="images/splash/building-parallax.png" alt="Diamond View — Dream Big"></div>
    <div class="L L-vig"></div>
    <div class="L L-ray" id="ray"><div class="ray r1"></div><div class="ray r2"></div><div class="ray r3"></div><div class="ray r4"></div></div>
    <div class="L L-fog" id="fog"><div class="fog f1"></div><div class="fog f2"></div><div class="fog f3"></div></div>
    <div class="L L-fg" id="fg"><div class="fg-l"></div><div class="fg-r"></div></div>
    <div class="L L-pt" id="pt"></div>
    <div class="L L-bot"></div>
    <div class="L L-top" id="top"></div>
  </div>
</section>

<section class="cta"><h2>Feeling in Motion</h2><p>An award-winning creative studio exploring what it means to create feeling through moving image.</p></section>
<section class="cta" style="min-height:50vh"><p style="opacity:.12;font-size:.7rem">Scroll back up to replay</p></section>

<div class="hint" id="hint"><span>Scroll</span><i></i></div>

<script>
  /* ── Lenis smooth scroll ── */
  const lenis = new Lenis({ lerp: 0.07, smoothWheel: true, wheelMultiplier: 0.8 });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t => lenis.raf(t * 1000));
  gsap.ticker.lagSmoothing(0);

  gsap.registerPlugin(ScrollTrigger);

  /* ── Particles ── */
  const ptEl = document.getElementById('pt');
  for(let i=0;i<60;i++){
    const d=document.createElement('div');d.className='pt';
    const s=1+Math.random()*2.5;
    Object.assign(d.style,{
      left:Math.random()*100+'%',top:Math.random()*100+'%',
      width:s+'px',height:s+'px',
      animationDuration:(10+Math.random()*20)+'s',
      animationDelay:(Math.random()*14)+'s'
    });
    ptEl.appendChild(d);
  }

  /* ── GSAP Timeline — scrubbed to scroll ── */
  const tl = gsap.timeline({
    scrollTrigger:{
      trigger:'.scene-wrap',
      pin:'#pin',
      start:'top top',
      end:'bottom bottom',
      scrub:0.5,       // tight 0.5s catch-up — responsive, not sluggish
    }
  });

  // Charcoal overlay dissolves — scene revealed
  tl.fromTo('#top',{opacity:1},{opacity:0,duration:.2,ease:'power2.out'},0);

  // SKY — barely moves (deep background)
  tl.fromTo('#sky',{yPercent:5},{yPercent:-5,ease:'none',duration:1},0);

  // BUILDING — strong vertical travel + slow push-in zoom
  tl.fromTo('#bld',
    {yPercent:25, scale:1},
    {yPercent:-25, scale:1.12, ease:'none', duration:1},
    0
  );

  // FOG — fades in, drifts upward fast
  tl.fromTo('.fog',
    {opacity:0, yPercent:40},
    {opacity:1, yPercent:-50, ease:'none', duration:1, stagger:0.08},
    0.05
  );

  // RAYS — bloom in during middle third
  tl.fromTo('#ray',{opacity:0},{opacity:.8,duration:.3,ease:'power2.in'},0.3);
  tl.to('#ray',{opacity:.4,duration:.3,ease:'power2.out'},0.7);

  // FOREGROUND — moves fastest (nearest camera), huge travel range
  tl.fromTo('#fg',
    {yPercent:50},
    {yPercent:-60, ease:'none', duration:1},
    0
  );

  // PARTICLES — medium drift
  tl.fromTo('#pt',
    {yPercent:15},
    {yPercent:-30, ease:'none', duration:1},
    0
  );

  /* ── Hide scroll hint ── */
  ScrollTrigger.create({
    trigger:'.reel',start:'top top',end:'bottom top',
    onLeave:()=>gsap.to('#hint',{opacity:0,duration:.25}),
    onEnterBack:()=>gsap.to('#hint',{opacity:.3,duration:.25}),
  });
</script>
</body>
</html>
